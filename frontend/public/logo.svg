<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGradient)"/>
  
  <!-- Main container circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.2"/>
  
  <!-- Storage cylinder (main element) -->
  <g id="storage-cylinder" filter="url(#shadow)">
    <!-- Cylinder body -->
    <ellipse cx="100" cy="75" rx="45" ry="15" fill="url(#primaryGradient)"/>
    <rect x="55" y="75" width="90" height="50" fill="url(#primaryGradient)"/>
    <ellipse cx="100" cy="125" rx="45" ry="15" fill="#1e40af"/>
    
    <!-- Cylinder highlights -->
    <ellipse cx="100" cy="75" rx="40" ry="12" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <path d="M 60 75 L 60 125" stroke="#1e3a8a" stroke-width="1" opacity="0.3"/>
    <path d="M 140 75 L 140 125" stroke="#1e3a8a" stroke-width="1" opacity="0.3"/>
    
    <!-- Data lines on cylinder -->
    <line x1="70" y1="85" x2="130" y2="85" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
    <line x1="70" y1="95" x2="130" y2="95" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
    <line x1="70" y1="105" x2="130" y2="105" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
    <line x1="70" y1="115" x2="130" y2="115" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Snapshot icon (camera shutter style) -->
  <g id="snapshot-icon" transform="translate(140, 50)" filter="url(#shadow)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="22" fill="url(#accentGradient)"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Shutter blades (6 segments) -->
    <g opacity="0.8">
      <path d="M 0,-12 L 6,-6 L 0,0 Z" fill="#ffffff" opacity="0.6"/>
      <path d="M 10.4,-6 L 6,0 L 0,0 Z" fill="#ffffff" opacity="0.5"/>
      <path d="M 10.4,6 L 0,6 L 6,0 Z" fill="#ffffff" opacity="0.4"/>
      <path d="M 0,12 L 0,6 L -6,6 Z" fill="#ffffff" opacity="0.6"/>
      <path d="M -10.4,6 L -6,0 L 0,6 Z" fill="#ffffff" opacity="0.5"/>
      <path d="M -10.4,-6 L 0,0 L 0,-6 Z" fill="#ffffff" opacity="0.4"/>
    </g>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#059669"/>
  </g>
  
  <!-- Clock/Schedule icon -->
  <g id="clock-icon" transform="translate(40, 50)" filter="url(#shadow)">
    <!-- Clock face -->
    <circle cx="0" cy="0" r="22" fill="url(#primaryGradient)" opacity="0.8"/>
    <circle cx="0" cy="0" r="18" fill="#1e40af"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    
    <!-- Clock markers -->
    <circle cx="0" cy="-12" r="1.5" fill="#60a5fa"/>
    <circle cx="12" cy="0" r="1.5" fill="#60a5fa"/>
    <circle cx="0" cy="12" r="1.5" fill="#60a5fa"/>
    <circle cx="-12" cy="0" r="1.5" fill="#60a5fa"/>
    
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="6" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Connecting arc lines -->
  <path d="M 62 60 Q 80 65 95 70" stroke="#10b981" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4,4"/>
  <path d="M 138 60 Q 120 65 105 70" stroke="#10b981" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4,4"/>
  
  <!-- Bottom text badge -->
  <g id="text-badge">
    <rect x="60" y="145" width="80" height="20" rx="10" fill="#1e40af" opacity="0.9"/>
    <text x="100" y="159" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">SNAPSHOT</text>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="170" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="170" cy="170" r="3" fill="#10b981" opacity="0.6"/>
  <circle cx="30" cy="30" r="3" fill="#2563eb" opacity="0.6"/>
  <circle cx="170" cy="30" r="3" fill="#2563eb" opacity="0.6"/>
</svg>

