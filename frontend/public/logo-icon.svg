<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Storage cylinder (simplified) -->
  <g id="storage">
    <!-- Top ellipse -->
    <ellipse cx="50" cy="35" rx="35" ry="12" fill="url(#iconGradient)"/>
    <!-- Body -->
    <rect x="15" y="35" width="70" height="30" fill="url(#iconGradient)"/>
    <!-- Bottom ellipse -->
    <ellipse cx="50" cy="65" rx="35" ry="12" fill="#1e40af"/>
    
    <!-- Data lines -->
    <line x1="25" y1="42" x2="75" y2="42" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
    <line x1="25" y1="50" x2="75" y2="50" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
    <line x1="25" y1="58" x2="75" y2="58" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
  </g>
  
  <!-- Snapshot badge (simplified camera) -->
  <g id="snapshot-badge" transform="translate(65, 20)">
    <circle cx="0" cy="0" r="16" fill="url(#snapGradient)"/>
    <!-- Shutter segments -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.3"/>
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#059669"/>
  </g>
</svg>

