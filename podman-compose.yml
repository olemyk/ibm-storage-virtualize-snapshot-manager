version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: snapshot-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-snapshots}
      POSTGRES_USER: ${DB_USER:-snapshots}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - snapshot-manager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-snapshots} -d ${DB_NAME:-snapshots}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: snapshot-manager-backend:latest
    container_name: snapshot-manager-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ALLOWED_ORIGINS: http://localhost,https://localhost,http://localhost:80,https://localhost:443,http://127.0.0.1,https://127.0.0.1,https://${EXTERNAL_HOSTNAME:-localhost}
      
      # Database configuration
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-snapshots}
      DB_USER: ${DB_USER:-snapshots}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      
      # Security configuration (REQUIRED)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      
      # Logging configuration
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/app.log
    volumes:
      - backend-logs:/app/logs
    networks:
      - snapshot-manager-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # React Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: snapshot-manager-frontend:latest
    container_name: snapshot-manager-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:443"
      - "${FRONTEND_HTTP_PORT:-80}:80"
    volumes:
      # Mount custom SSL certificates if available
      - ${SSL_CERT_PATH:-./ssl}:/etc/nginx/ssl:ro
      # Mount custom Nginx config if needed
      # - ./frontend/custom-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - snapshot-manager-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

networks:
  snapshot-manager-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  backend-logs:
    driver: local
