name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run go fmt
        working-directory: backend
        run: |
          # Check formatting (exclude scripts directory with multiple main functions)
          UNFORMATTED=$(gofmt -s -l cmd internal 2>/dev/null)
          if [ -n "$UNFORMATTED" ]; then
            echo "Code is not formatted. Run 'go fmt ./cmd/... ./internal/...'"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        working-directory: backend
        run: go vet ./cmd/... ./internal/...

      - name: Run tests with coverage
        working-directory: backend
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.out
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.11'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: backend
        continue-on-error: true
        run: govulncheck ./cmd/... ./internal/...

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check for TypeScript errors
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-security, frontend-build, frontend-security]
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Backend Security: ${{ needs.backend-security.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Frontend Security: ${{ needs.frontend-security.result }}"
          
          # Only fail on critical jobs (tests and build), not security scans
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          
          echo "✅ All critical CI checks passed!"
          
          # Warn about security issues but don't fail
          if [ "${{ needs.backend-security.result }}" != "success" ]; then
            echo "⚠️  Backend security scan found issues (non-blocking)"
          fi
          if [ "${{ needs.frontend-security.result }}" != "success" ]; then
            echo "⚠️  Frontend security scan found issues (non-blocking)"
          fi

# Made with Bob
