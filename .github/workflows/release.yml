name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected format: v1.2.3"
            exit 1
          fi
          echo "Valid tag: $TAG"

      - name: Check if tag matches version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Release tag: $TAG"

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build backend binaries
        working-directory: backend
        run: |
          # Build for multiple platforms
          GOOS=linux GOARCH=amd64 go build -o ../dist/snapshot-manager-linux-amd64 ./cmd/server
          GOOS=linux GOARCH=arm64 go build -o ../dist/snapshot-manager-linux-arm64 ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -o ../dist/snapshot-manager-darwin-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o ../dist/snapshot-manager-darwin-arm64 ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o ../dist/snapshot-manager-windows-amd64.exe ./cmd/server

      - name: Create checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/

  build-containers:
    name: Build and Push Release Containers
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/backend:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/frontend:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-artifacts, build-containers]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 $TAG^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "First release"
            CHANGELOG="Initial release"
          else
            echo "Generating changelog from $PREV_TAG to $TAG"
            CHANGELOG=$(git log $PREV_TAG..$TAG --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to file for release notes
          cat > release-notes.md << EOF
          ## What's Changed
          
          $CHANGELOG
          
          ## Container Images
          
          Pull the latest release:
          
          \`\`\`bash
          # Backend
          docker pull ghcr.io/${{ github.repository }}/backend:${TAG#v}
          
          # Frontend
          docker pull ghcr.io/${{ github.repository }}/frontend:${TAG#v}
          
          # Or use docker-compose/podman-compose
          docker pull ghcr.io/${{ github.repository }}/backend:latest
          docker pull ghcr.io/${{ github.repository }}/frontend:latest
          \`\`\`
          
          ## Installation
          
          ### Using Containers (Recommended)
          
          1. Download the \`podman-compose.yml\` file
          2. Create a \`.env\` file with required variables
          3. Run: \`podman-compose up -d\`
          
          See [DEPLOYMENT.md](https://github.com/${{ github.repository }}/blob/main/DEPLOYMENT.md) for details.
          
          ### Binary Installation
          
          Download the appropriate binary for your platform from the assets below.
          
          **Verify checksums:**
          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`
          
          ## Full Changelog
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG
          EOF
          
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Post-Release Notifications
    runs-on: ubuntu-latest
    needs: create-release
    if: always()
    
    steps:
      - name: Release summary
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "✅ Release $TAG created successfully!"
          echo ""
          echo "📦 Artifacts:"
          echo "  - Binaries for Linux, macOS, Windows"
          echo "  - Container images (amd64, arm64)"
          echo ""
          echo "🔗 Links:"
          echo "  - Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG"
          echo "  - Containers: https://github.com/${{ github.repository }}/pkgs/container/backend"
          echo ""
          echo "📝 Next steps:"
          echo "  - Update documentation if needed"
          echo "  - Announce release to users"
          echo "  - Monitor for issues"

# Made with Bob
